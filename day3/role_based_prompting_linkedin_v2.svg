<circle cx="410" cy="800" r="26" fill="#8B5E3C"/>
<text x="410" y="808" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#F4EEE2" font-weight="600">MKT</text>
<text x="410" y="855" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#3D2B1F" font-weight="600">Marketer</text>
