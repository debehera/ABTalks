<line x1="90" y1="945" x2="990" y2="945" stroke="#D8C7A9" stroke-width="1"/>

<text x="540" y="990" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#6E5A47">One instruction. A completely different result.</text>

<text x="540" y="1035" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#8B5E3C" letter-spacing="2">#ABTalks · #ClaudeAI · #PromptEngineering</text>

