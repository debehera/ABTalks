<!-- Card 3: Writer -->
<rect x="530" y="750" width="200" height="150" rx="14" fill="#EDE4D3" stroke="#C9A876" stroke-width="1.5"/>
<circle cx="630" cy="800" r="26" fill="#8B5E3C"/>
<text x="630" y="808" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#F4EEE2" font-weight="600">W</text>
<text x="630" y="855" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#3D2B1F" font-weight="600">Writer</text>
<text x="630" y="878" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8A7860">Tone, voice, structure</text>

