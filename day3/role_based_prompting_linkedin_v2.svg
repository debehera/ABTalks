<rect x="750" y="750" width="200" height="150" rx="14" fill="#EDE4D3" stroke="#C9A876" stroke-width="1.5"/>
<circle cx="850" cy="800" r="26" fill="#8B5E3C"/>
<text x="850" y="808" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#F4EEE2" font-weight="600">%</text>
